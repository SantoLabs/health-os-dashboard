<!doctype html><html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Health OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0b1020;--card:#151b2e;--card2:#1b2236;--line:#262f47;--txt:#e8edf7;--mut:#8b96b0;--ind:#6366f1;--grn:#16a34a;--amb:#f59e0b;--red:#ef4444;--orange:#f97316;--cyan:#06b6d4;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:linear-gradient(180deg,#0b1020,#0e1428);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
  .wrap{max-width:540px;margin:0 auto;padding:18px 18px 90px}
  .hidden{display:none!important}
  .login{min-height:100vh;display:flex;flex-direction:column;justify-content:center;gap:14px;max-width:360px;margin:0 auto;padding:24px}
  .login h1{font-size:26px;margin:0 0 2px;text-align:center}
  .login p.sub{color:var(--mut);text-align:center;margin:0 0 14px;font-size:14px}
  input,select,textarea{font-family:inherit}
  input{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--txt);font-size:15px}
  button{cursor:pointer;border:none;border-radius:12px;font-size:15px;font-weight:700;padding:13px 16px}
  .btn-primary{background:var(--ind);color:#fff;width:100%}
  .btn-google{background:#fff;color:#1f2430;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-ghost{background:transparent;color:var(--mut);font-weight:600;padding:6px 8px}
  .err{color:var(--red);font-size:13px;text-align:center;min-height:16px}
  .divider{display:flex;align-items:center;gap:10px;color:var(--mut);font-size:12px;margin:4px 0}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
  .topbar h2{font-size:22px;margin:0}
  .who{font-size:12px;color:var(--mut)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin:10px 0}
  .hero{background:radial-gradient(120% 120% at 50% 0,rgba(99,102,241,.25),transparent),var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;text-align:center;margin-bottom:14px}
  .ring{font-size:64px;font-weight:800;line-height:1;margin:6px 0}
  .lbl{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:1px}
  .verdict{font-size:15px;margin-top:12px;background:var(--card2);border-radius:12px;padding:12px 14px;line-height:1.5}
  .st{font-size:12px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin:18px 4px 8px}
  .factor{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:11px 13px;margin:7px 0}
  .emo{font-size:22px}
  .mid{flex:1;min-width:0}
  .fl{font-size:14px;font-weight:700}
  .fn{font-size:12px;color:var(--mut);margin-top:1px}
  .fv{text-align:right;font-weight:800;font-size:15px;white-space:nowrap}
  .fd{font-size:11px;color:var(--mut);font-weight:600;text-align:right}
  .pos{border-left-color:var(--grn)} .neu{border-left-color:var(--amb)} .neg{border-left-color:var(--red)}
  .reco{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:8px 0;font-size:14px;line-height:1.5}
  .reco b{color:var(--ind)}
  .checkin{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:16px;text-align:center}
  .faces{display:flex;justify-content:space-between;gap:6px;margin-top:10px}
  .face{flex:1;font-size:30px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 0;transition:transform .08s}
  .face.sel{border-color:var(--ind);background:rgba(99,102,241,.18);transform:scale(1.06)}
  .muted{color:var(--mut);font-size:12px}
  .spin{text-align:center;color:var(--mut);padding:50px}
  .row{display:flex;gap:10px}
  .col{flex:1}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;text-align:center}
  .stat .v{font-size:24px;font-weight:800}
  .stat .k{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
  .seg{display:flex;gap:6px;margin:4px 0 10px}
  .seg button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--mut);font-size:13px;padding:8px}
  .seg button.on{background:var(--ind);color:#fff;border-color:var(--ind)}
  .chartcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:9px 0}
  .chartcard .h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .chartcard .h .t{font-size:14px;font-weight:700}
  .chartcard .h .s{font-size:12px;color:var(--mut)}
  svg{display:block;width:100%;overflow:visible}
  .interp{font-size:12.5px;color:var(--txt);background:var(--card2);border-radius:9px;padding:9px 11px;margin-top:9px;line-height:1.5}
  .bar{display:flex;align-items:center;gap:10px;margin:6px 0}
  .bar .bl{width:84px;font-size:12px;color:var(--mut)}
  .bar .bt{flex:1;background:#0e1428;border-radius:6px;height:16px;overflow:hidden}
  .bar .bf{height:16px;border-radius:6px}
  .bar .bv{width:86px;text-align:right;font-size:12px;font-weight:700}
  .mk{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:12px 14px;margin:8px 0}
  .mk .top{display:flex;justify-content:space-between;align-items:baseline}
  .mk .nm{font-size:14px;font-weight:700}
  .mk .vl{font-size:18px;font-weight:800}
  .mk .rg{font-size:11px;color:var(--mut);margin-top:2px}
  .mk .wy{font-size:12px;color:var(--mut);margin-top:7px;line-height:1.45}
  .tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:50px;text-transform:uppercase;letter-spacing:.4px}
  .tag.hi{background:rgba(239,68,68,.15);color:#fca5a5} .tag.lo{background:rgba(245,158,11,.15);color:#fcd34d} .tag.ok{background:rgba(22,163,74,.15);color:#86efac}
  .axis{display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-top:3px}
  .mtable{width:100%;border-collapse:collapse;font-size:13px}
  .mtable td{padding:6px 0;border-bottom:1px solid var(--line)}
  .mtable tr:last-child td{border-bottom:none}
  .ms{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;background:var(--card);border:1px solid var(--line);margin:7px 0}
  .ms .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .ms .ml{flex:1;font-size:14px;font-weight:600;min-width:0}
  .ms .mw{font-size:11px;color:var(--mut);white-space:nowrap}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:50px;background:var(--card2);color:var(--txt);white-space:nowrap}
  .gbtn{color:var(--mut);background:none;border:none;font-size:16px;cursor:pointer;padding:2px 5px}
  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--ind);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:50px;opacity:0;transition:opacity .25s;z-index:80;pointer-events:none}
  .toast.show{opacity:.97}
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,18,33,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:7px 4px 9px;z-index:50}
  .nav button{background:none;border:none;color:var(--mut);font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;flex:1}
  .nav button .ic{font-size:19px}
  .nav button.on{color:var(--ind)}
  .legend{font-size:10px;color:var(--mut);margin-top:5px}
  .legend span{font-weight:800}
  .chartwrap{position:relative;touch-action:pan-y}
  .cross{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.35);display:none;pointer-events:none}
  .ctip{position:absolute;top:0;transform:translate(-50%,-115%);background:#0b1020;border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:11px;font-weight:600;white-space:nowrap;display:none;pointer-events:none;z-index:40;color:var(--mut)}
  .ctip b{color:#fff}
  .tapnote{font-size:10px;color:var(--mut);text-align:center;margin:2px 0 8px}
  .exwrap{padding:2px 13px 10px}
  .exrow{display:flex;justify-content:space-between;gap:8px;font-size:12px;padding:5px 0;border-top:1px solid var(--line)}
  .exrow .em{color:var(--mut);text-transform:capitalize;font-size:11px}
  .chev{color:var(--mut);font-weight:600;display:inline-block;transition:transform .15s}
  .chev.open{transform:rotate(90deg)}
  .hyp{display:block;width:100%;height:88px}
  .nap{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 13px;margin:6px 0}
  .nap .nd{font-size:13px;font-weight:700}
  .nap .nn{font-size:11px;color:var(--mut);margin-top:1px;text-transform:capitalize}
  .nap .nmv{font-size:15px;font-weight:800;white-space:nowrap}
  .ins{background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:11px 13px;margin:7px 0}
  .ins .it{font-size:13px;font-weight:700}
  .ins .ix{font-size:12px;color:var(--mut);margin-top:3px;line-height:1.5}
  .mbar{margin:9px 0}
  .mbar .top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .mbar .top b{font-weight:800}
  .mbar .tk{height:10px;background:#0e1428;border-radius:6px;overflow:hidden}
  .mbar .tf{height:10px;border-radius:6px}
  .ninput{width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:14px;resize:vertical;min-height:48px}
  .minput{width:100%;padding:9px 8px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:14px;text-align:center}
  .macg{display:flex;gap:6px;margin:9px 0}
  .macg .mc{flex:1}
  .macg .mc label{font-size:10px;color:var(--mut);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;text-align:center}
  .btn-sm{font-size:13px;padding:10px 12px;border-radius:10px}
  .mealrow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 13px;margin:6px 0}
  .mealrow .mt{flex:1;min-width:0}
  .mealrow .md{font-size:13px;font-weight:700}
  .mealrow .ms2{font-size:11px;color:var(--mut);margin-top:1px}
  .confz{display:inline-block;font-size:9px;font-weight:800;padding:1px 6px;border-radius:50px;text-transform:uppercase;margin-right:4px}
  .confz.high{background:rgba(22,163,74,.15);color:#86efac}.confz.medium{background:rgba(245,158,11,.15);color:#fcd34d}.confz.low{background:rgba(239,68,68,.15);color:#fca5a5}
  .sheet{position:fixed;inset:0;background:rgba(5,8,17,.6);backdrop-filter:blur(3px);z-index:70;display:flex;align-items:flex-end}
  .sheet .panel{background:var(--card);border-top-left-radius:20px;border-top-right-radius:20px;width:100%;max-width:540px;margin:0 auto;padding:10px 14px 22px;border:1px solid var(--line)}
  .sheet .gh{width:40px;height:4px;background:var(--line);border-radius:3px;margin:6px auto 12px}
  .sheet button.mi{display:flex;align-items:center;gap:12px;width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:7px 0;color:var(--txt);font-size:15px;font-weight:600;text-align:left}
  .sheet button.mi .ic{font-size:20px}
  .ph{text-align:center;padding:30px 10px}
  .ph .pe{font-size:38px}
  .ph .pt{font-weight:700;margin-top:10px;font-size:17px}
  .ph .pd{color:var(--mut);margin-top:8px;line-height:1.55;font-size:14px}
</style></head>
<body>
<div id="login" class="login hidden">
  <h1>&#127939; Health OS</h1>
  <p class="sub">Your personal health intelligence</p>
  <input id="email" type="email" placeholder="Email" autocomplete="username"/>
  <input id="pw" type="password" placeholder="Password" autocomplete="current-password"/>
  <button class="btn-primary" onclick="doLogin()">Sign in</button>
  <div class="err" id="loginErr"></div>
  <div class="divider">or</div>
  <button class="btn-google" onclick="doGoogle()"><span>&#128273;</span> Continue with Google</button>
  <button class="btn-ghost" onclick="alert('Ask Santosh for evaluation access \u2014 invite-only during preview.')">Need an account?</button>
</div>

<div id="app" class="wrap hidden">
  <div class="topbar"><div><h2 id="viewTitle">Today</h2><div class="who" id="lastSync"></div></div>
    <div style="text-align:right"><div class="who" id="who"></div><div style="display:flex;gap:4px;justify-content:flex-end;margin-top:2px"><button class="btn-ghost" id="refreshBtn" onclick="refresh()">↻ Refresh</button><button class="btn-ghost" onclick="doLogout()">Sign out</button></div></div>
  </div>
  <div id="syncbar" style="height:3px;background:linear-gradient(90deg,#6366f1,#22d3ee);width:0;border-radius:2px;transition:width .5s ease;display:none;margin-bottom:6px"></div>
  <div id="body"><div class="spin">Loading&#8230;</div></div>
</div>
<div id="toast" class="toast"></div>

<div id="moreSheet" class="sheet hidden" onclick="if(event.target.id==='moreSheet')closeMore()">
  <div class="panel">
    <div class="gh"></div>
    <button class="mi" onclick="go('nutrition')"><span class="ic">&#127869;&#65039;</span> Nutrition</button>
    <button class="mi" onclick="go('goals')"><span class="ic">&#127937;</span> Goals &amp; Body</button>
    <button class="mi" onclick="go('medical')"><span class="ic">&#129658;</span> Medical</button>
    <button class="mi" onclick="go('schedule')"><span class="ic">&#128197;</span> Schedule</button>
    <button class="mi" onclick="go('ask')"><span class="ic">&#128172;</span> Ask Health AI</button>
  </div>
</div>

<div id="nav" class="nav hidden">
  <button data-v="today" class="on" onclick="go('today')"><span class="ic">&#9728;&#65039;</span>Today</button>
  <button data-v="trends" onclick="go('trends')"><span class="ic">&#128200;</span>Trends</button>
  <button data-v="sleep" onclick="go('sleep')"><span class="ic">&#128564;</span>Sleep</button>
  <button data-v="training" onclick="go('training')"><span class="ic">&#127947;&#65039;</span>Train</button>
  <button data-v="more" onclick="openMore()"><span class="ic">&#9776;</span>More</button>
</div>

<script>
const SB_URL="https://ntzlmclojiehhrzkgnsp.supabase.co", SB_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50emxtY2xvamllaGhyemtnbnNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzE2NTYsImV4cCI6MjA5NTY0NzY1Nn0.EVoELUiK80AdYYtGcLP5u2nL6atia7Txq4xc4K334dM", API="https://ntzlmclojiehhrzkgnsp.supabase.co/functions/v1/health-dashboard", ACT="https://ntzlmclojiehhrzkgnsp.supabase.co/functions/v1/health-actions";
const sb=window.supabase.createClient(SB_URL,SB_ANON);
const $=(id)=>document.getElementById(id);
let TOKEN=null, cache={}, trendDays=30, sleepDays=30, toastT=null;
let GOALS=[], usedAI=false, lastConf=null, lastAssump=null;
const SPORT_COL={Run:'#f59e0b',Swim:'#06b6d4',Ride:'#34d399',Other:'#8b96b0'};
const MOREV=['nutrition','goals','medical','schedule','ask'];
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function showToast(msg){const t=$("toast");t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}
function syncBar(frac){const b=$("syncbar");if(!b)return;b.style.display='block';b.style.width=Math.min(98,Math.round(frac*100))+'%';}
function syncBarDone(){const b=$("syncbar");if(!b)return;b.style.width='100%';setTimeout(()=>{b.style.display='none';b.style.width='0';},600);}
function openMore(){$("moreSheet").classList.remove("hidden");}
function closeMore(){const s=$("moreSheet");if(s)s.classList.add("hidden");}

async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){showApp(session);}else{$("login").classList.remove("hidden");}
}
function showApp(session){
  $("login").classList.add("hidden");$("app").classList.remove("hidden");$("nav").classList.remove("hidden");
  TOKEN=session.access_token;
  const em=session.user.email||"";$("who").textContent=em;
  go('today');
}
async function doLogin(){
  $("loginErr").textContent="";
  const {data,error}=await sb.auth.signInWithPassword({email:$("email").value.trim(),password:$("pw").value});
  if(error){$("loginErr").textContent=error.message;return;}
  showApp(data.session);
}
async function doGoogle(){
  const {error}=await sb.auth.signInWithOAuth({provider:"google",options:{redirectTo:window.location.href.split('?')[0]}});
  if(error)$("loginErr").textContent=error.message;
}
async function doLogout(){await sb.auth.signOut();location.reload();}

async function api(route){
  const r=await fetch(API+"?api="+route+"&apikey="+SB_ANON,{headers:{Authorization:"Bearer "+TOKEN}});
  if(r.status===401){await sb.auth.signOut();location.reload();return null;}
  return await r.json();
}
async function actGet(route){
  const r=await fetch(ACT+"?api="+route+"&apikey="+SB_ANON,{headers:{Authorization:"Bearer "+TOKEN}});
  if(r.status===401){await sb.auth.signOut();location.reload();return null;}
  return await r.json();
}
async function actPost(route,body){
  const r=await fetch(ACT+"?api="+route+"&apikey="+SB_ANON,{method:'POST',headers:{Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body||{})});
  if(r.status===401){await sb.auth.signOut();location.reload();return null;}
  return await r.json();
}

function relTime(iso){if(!iso)return '';const s=(Date.now()-new Date(iso).getTime())/1000;if(s<90)return 'just now';const m=Math.round(s/60);if(m<60)return m+'m ago';const h=Math.round(m/60);if(h<24)return h+'h ago';return Math.round(h/24)+'d ago';}
function setLastSync(d){if(d&&d.last_synced){$("lastSync").textContent='Synced '+relTime(d.last_synced)+(d.data_through?' \u00B7 data through '+d.data_through:'');}}

async function refresh(){
  const cur=document.querySelector('.nav button.on');let view=cur?cur.dataset.v:'today';if(view==='more')view='today';
  const b=$("refreshBtn");
  let before=cache.today&&cache.today.last_synced;
  if(!before){try{before=(await api('today')).last_synced;}catch(e){}}
  if(b)b.textContent='↻ Syncing…';syncBar(0.05);
  try{await fetch(API+"?api=resync&apikey="+SB_ANON,{method:'POST',headers:{Authorization:'Bearer '+TOKEN}});}catch(e){}
  const t0=Date.now(),MAX=180000;let done=false;
  while(Date.now()-t0<MAX){
    await sleep(5000);
    syncBar(0.05+0.92*((Date.now()-t0)/MAX));
    let td=null;try{td=await api('today');}catch(e){}
    if(td&&td.last_synced&&(!before||new Date(td.last_synced)>new Date(before))){done=true;cache.today=td;break;}
  }
  syncBarDone();cache={};if(b)b.textContent='↻ Refresh';
  await go(view);
  showToast(done?'Device re-synced ✓':'Sync still running — showing latest');
}

const TITLES={today:"Today",trends:"Trends",sleep:"Sleep",training:"Training & Diet",nutrition:"Nutrition",goals:"Goals & Body",medical:"Medical",schedule:"Schedule",ask:"Ask Health AI"};
async function go(v){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("on",b.dataset.v===v||(b.dataset.v==='more'&&MOREV.includes(v))));
  closeMore();
  $("viewTitle").textContent=TITLES[v]||'';window.scrollTo(0,0);
  $("body").innerHTML='<div class="spin">Loading\u2026</div>';
  try{
    if(v==='today')await renderTodayView();
    else if(v==='trends')await renderTrends();
    else if(v==='sleep')await renderSleep();
    else if(v==='training')await renderTraining();
    else if(v==='nutrition')await renderNutrition();
    else if(v==='goals')await renderGoals();
    else if(v==='medical')await renderMedical();
    else if(v==='schedule')renderSchedule();
    else if(v==='ask')renderAsk();
  }catch(e){$("body").innerHTML='<div class="spin">Could not load. '+(e.message||'')+'</div>';}
}

function scoreColor(s){if(s==null)return"var(--mut)";if(s>=85)return"var(--grn)";if(s>=70)return"var(--amb)";if(s>=50)return"var(--orange)";return"var(--red)";}
function impClass(i){return i==="positive"?"pos":i==="negative"?"neg":"neu";}

/* ---------- TODAY ---------- */
async function renderTodayView(){
  const d=await api('today');cache.today=d;setLastSync(d);
  const fs=d.checkin&&d.checkin.feeling_score;
  let shown=d.score,adjNote='';

/* ---------- SVG line chart ---------- */
function lineChart(points,opts){
  opts=opts||{};const W=480,H=opts.h||90,P=6;
  const vals=points.map(p=>p.v).filter(v=>v!=null);
  if(!vals.length)return '<div class="muted">No data yet</div>';
  let mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  if(opts.min!=null)mn=Math.min(mn,opts.min);if(opts.max!=null)mx=Math.max(mx,opts.max);
  if(mn===mx){mn-=1;mx+=1;}
  const n=points.length;
  let xf;
  if(opts.timeScale&&points.every(p=>p.date)){const ts=points.map(p=>+new Date(p.date));const t0=Math.min.apply(null,ts),t1=Math.max.apply(null,ts);xf=i=>P+((t1===t0)?0:(ts[i]-t0)/(t1-t0))*(W-2*P);}
  else{xf=i=>P+(n<=1?0:i/(n-1))*(W-2*P);}
  const y=v=>H-P-((v-mn)/(mx-mn))*(H-2*P);
  let d='',last=null;
  points.forEach((p,i)=>{if(p.v==null)return;const cmd=(last==null)?'M':'L';d+=cmd+xf(i).toFixed(1)+' '+y(p.v).toFixed(1)+' ';last=i;});
  const col=opts.color||'var(--ind)';
  let band='';
  if(opts.band){const y1=y(opts.band[1]),y0=y(opts.band[0]);band='<rect x="0" y="'+Math.min(y0,y1).toFixed(1)+'" width="'+W+'" height="'+Math.abs(y0-y1).toFixed(1)+'" fill="rgba(22,163,74,.10)"/>';}
  const lastV=vals[vals.length-1];
  const lp=(function(){for(let i=points.length-1;i>=0;i--)if(points[i].v!=null)return i;return 0;})();
  return '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="height:'+H+'px">'+band+'<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round"/><circle cx="'+xf(lp).toFixed(1)+'" cy="'+y(lastV).toFixed(1)+'" r="3.5" fill="'+col+'"/></svg>';
}
function stackedSleep(points){
  const W=480,H=110,P=4,n=points.length;if(!n)return '<div class="muted">No data yet</div>';
  const bw=Math.max(2,(W-2*P)/n-2);const max=540;
  let s='';points.forEach((p,i)=>{const x=P+i*((W-2*P)/n);let yb=H-P;
    [[p.deep,'#1e3a8a'],[p.rem,'#6366f1'],[p.light,'#a5b4fc']].forEach(seg=>{const v=seg[0]||0;const hh=(v/max)*(H-2*P);yb-=hh;s+='<rect x="'+x.toFixed(1)+'" y="'+yb.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+hh.toFixed(1)+'" fill="'+seg[1]+'"/>';});
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="height:'+H+'px">'+s+'</svg>';
}
function fmtMD(s){const d=new Date(s);return (d.getUTCMonth()+1)+'/'+d.getUTCDate();}
function fmtMDName(s){const d=new Date(s);return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()]+' '+d.getUTCDate();}
function fmtMY(s){const d=new Date(s);return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()]+" '"+String(d.getUTCFullYear()).slice(2);}
function dateAxis(arr,fmt){fmt=fmt||fmtMD;const ds=(arr||[]).filter(p=>p&&p.date).map(p=>p.date);if(ds.length<2)return '';return '<div class="axis"><span>'+fmt(ds[0])+'</span><span>'+fmt(ds[Math.floor(ds.length/2)])+'</span><span>'+fmt(ds[ds.length-1])+'</span></div>';}
function interp(txt){return txt?'<div class="interp">'+txt+'</div>':'';}
function card(title,sub,inner,legend,extra){return '<div class="chartcard"><div class="h"><div class="t">'+title+'</div><div class="s">'+(sub||'')+'</div></div>'+inner+(legend?'<div class="legend">'+legend+'</div>':'')+(extra||'')+'</div>';}

/* ---------- interactive chart wrappers: tap/drag to read values ---------- */
function iChart(points,opts){
  opts=opts||{};
  const svg=lineChart(points,opts);
  if(!points||!points.length)return svg;
  const W=480,P=6;let xs;
  if(opts.timeScale&&points.every(p=>p.date)){const ts=points.map(p=>+new Date(p.date));const t0=Math.min.apply(null,ts),t1=Math.max.apply(null,ts);xs=ts.map(t=>(P+((t1===t0)?0:(t-t0)/(t1-t0))*(W-2*P))/W);}
  else{const n=points.length;xs=points.map((p,i)=>(P+(n<=1?0:i/(n-1))*(W-2*P))/W);}
  const ser=points.map((p,i)=>({x:Math.round(xs[i]*1000)/1000,v:p.v,d:p.date?fmtMDName(p.date):''}));
  return '<div class="chartwrap" data-series="'+encodeURIComponent(JSON.stringify(ser))+'" data-unit="'+(opts.unit||'')+'">'+svg+'<div class="cross"></div><div class="ctip"></div></div>';
}
function iSleep(points){
  const svg=stackedSleep(points);
  if(!points||!points.length)return svg;
  const W=480,P=4,n=points.length,step=(W-2*P)/n;
  const ser=points.map((p,i)=>({x:Math.round(((P+i*step+step/2)/W)*1000)/1000,d:p.date?fmtMDName(p.date):'',total:p.total,deep:p.deep,rem:p.rem,light:p.light}));
  return '<div class="chartwrap" data-sleep="'+encodeURIComponent(JSON.stringify(ser))+'">'+svg+'<div class="cross"></div><div class="ctip"></div></div>';
}
function chartShow(wrap,clientX){
  const rect=wrap.getBoundingClientRect();if(!rect.width)return;
  let f=(clientX-rect.left)/rect.width;f=Math.max(0,Math.min(1,f));
  const cross=wrap.querySelector('.cross'),tip=wrap.querySelector('.ctip');if(!cross||!tip)return;
  let html='',px=0;
  if(wrap.dataset.sleep){let ser;try{ser=JSON.parse(decodeURIComponent(wrap.dataset.sleep));}catch(e){return;}if(!ser.length)return;let best=0,bd=9;ser.forEach((p,i)=>{const dd=Math.abs(p.x-f);if(dd<bd){bd=dd;best=i;}});const p=ser[best];px=p.x*rect.width;const hrs=p.total!=null?(Math.round(p.total/6)/10)+'h':'\u2013';html=(p.d?p.d+': ':'')+'<b>'+hrs+'</b> \u00B7 D'+(p.deep||0)+' R'+(p.rem||0)+' L'+(p.light||0);}
  else{let ser;try{ser=JSON.parse(decodeURIComponent(wrap.dataset.series||''));}catch(e){return;}if(!ser.length)return;let best=-1,bd=9;ser.forEach((p,i)=>{if(p.v==null)return;const dd=Math.abs(p.x-f);if(dd<bd){bd=dd;best=i;}});if(best<0)return;const p=ser[best];px=p.x*rect.width;let v=p.v;if(typeof v==='number'&&!Number.isInteger(v))v=Math.round(v*10)/10;html=(p.d?p.d+': ':'')+'<b>'+v+(wrap.dataset.unit||'')+'</b>';}
  cross.style.left=px+'px';cross.style.display='block';
  tip.innerHTML=html;tip.style.display='block';
  const tw=tip.offsetWidth||60;let lx=px,tx='-50%';if(px<tw/2){lx=2;tx='0';}else if(px>rect.width-tw/2){lx=rect.width-2;tx='-100%';}
  tip.style.left=lx+'px';tip.style.transform='translate('+tx+',-115%)';
}
function chartHide(){document.querySelectorAll('.chartwrap').forEach(w=>{const c=w.querySelector('.cross'),t=w.querySelector('.ctip');if(c)c.style.display='none';if(t)t.style.display='none';});}
function chartEvt(e){const tgt=e.target;const wrap=(tgt&&tgt.closest)?tgt.closest('.chartwrap'):null;if(!wrap){chartHide();return;}const cx=(e.touches&&e.touches[0])?e.touches[0].clientX:e.clientX;if(cx==null)return;chartShow(wrap,cx);}

function istClock(iso){const d=new Date(new Date(iso).getTime()+5.5*3600000);let H=d.getUTCHours(),m=d.getUTCMinutes();const ap=H<12?'a':'p';let h=H%12;if(h===0)h=12;return h+':'+String(m).padStart(2,'0')+ap;}
function hypnoChart(segs,win){
  if(!segs||!segs.length||!win)return '<div class="muted">No stage breakdown for last night.</div>';
  const W=480,H=88,P=2,rowH=(H-2*P)/4;
  const t0=+new Date(win.start),t1=+new Date(win.end),span=(t1-t0)||1;
  const rows={awake:0,rem:1,light:2,deep:3};
  const col={awake:'#f59e0b',rem:'#6366f1',light:'#a5b4fc',deep:'#1e3a8a'};
  let r='';
  segs.forEach(s=>{const ri=rows[s.stage];if(ri==null)return;const x=P+((+new Date(s.start)-t0)/span)*(W-2*P);const w=Math.max(0.6,((+new Date(s.end)-+new Date(s.start))/span)*(W-2*P));const y=P+ri*rowH;r+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+(rowH-1.5).toFixed(1)+'" rx="1.5" fill="'+col[s.stage]+'"/>';});
  return '<svg class="hyp" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+r+'</svg>';
}

    h+=card('By sport','sessions \u00B7 distance',bars);}
  if(ca.recent&&ca.recent.length){h+='<div class="st">Recent activities</div>';ca.recent.slice(0,5).forEach(c=>{const col=SPORT_COL[c.sport]||'#8b96b0';h+='<div class="factor neu" style="border-left-color:'+col+'"><div class="mid"><div class="fl">'+c.sport+'</div><div class="fn">'+c.date+'</div></div><div><div class="fv">'+c.km+' km</div><div class="fd">'+c.mins+' min</div></div></div>';});}
  const t=d.nutrition_targets||{};const wd=t.workout_day||{},rd=t.rest_day||{};
  const keys2=['calories','protein','carbs','fats','fiber','water'];
  if(Object.keys(wd).length){h+='<div class="st">Nutrition targets</div><div class="card">';
    h+='<table style="width:100%;border-collapse:collapse;font-size:13px"><tr><td class="muted" style="padding:5px 0"></td><td class="muted" style="text-align:right">Workout day</td><td class="muted" style="text-align:right">Rest day</td></tr>';
    keys2.forEach(k=>{if(wd[k]||rd[k])h+='<tr><td style="padding:5px 0;text-transform:capitalize">'+k+'</td><td style="text-align:right;font-weight:600">'+(wd[k]||'\u2013')+'</td><td style="text-align:right;color:var(--mut)">'+(rd[k]||'\u2013')+'</td></tr>';});
    h+='</table><div class="muted" style="margin-top:8px">Log meals against these in the <b>Nutrition</b> tab.</div></div>';}
  $("body").innerHTML=h;
}

/* ---------- NUTRITION ---------- */
function macroBar(label,total,tgt,unit,color){
  const t=(tgt&&tgt.n)?tgt.n:null;const pct=t?Math.min(100,Math.round(total/t*100)):0;
  const over=t&&total>t*1.05;
  return '<div class="mbar"><div class="top"><span>'+label+'</span><span>'+(over?'<span style="color:#fca5a5">':'')+'<b>'+total+unit+'</b>'+(over?'</span>':'')+' / '+(tgt?tgt.raw:'\u2013')+'</span></div><div class="tk"><div class="tf" style="width:'+pct+'%;background:'+color+'"></div></div></div>';
}
async function renderNutrition(){
  const d=await actGet('nutrition');if(!d){$("body").innerHTML='<div class="spin">Could not load.</div>';return;}
  cache.nutrition=d;const tg=d.targets||{},to=d.totals||{};
  let h='<div class="muted" style="margin:2px 0 10px">Today \u00B7 '+d.date+' \u00B7 targets shown for '+(tg.basis==='workout_day'?'a workout day':'a rest day')+'</div>';
  h+=macroBar('Calories',to.calories||0,tg.calories,'','#6366f1');
  h+=macroBar('Protein',to.protein||0,tg.protein,'g','#16a34a');
  h+=macroBar('Carbs',to.carbs||0,tg.carbs,'g','#f59e0b');
  h+=macroBar('Fat',to.fats||0,tg.fats,'g','#f97316');
  h+=macroBar('Fiber',to.fiber||0,tg.fiber,'g','#06b6d4');
  const wl=Math.round((to.water||0)/100)/10;
  h+=macroBar('Water',wl,tg.water,'L','#22d3ee');
  h+='<div class="card"><div style="font-weight:700;margin-bottom:8px">Log a meal</div>';
  h+='<textarea id="mealDesc" class="ninput" placeholder="What did you eat? e.g. 2 rotis, dal, paneer curry, salad"></textarea>';
  h+='<div style="display:flex;gap:8px;margin-top:8px"><button class="btn-primary btn-sm" id="estBtn" onclick="nutEstimate()" style="flex:1">\u2728 Estimate with AI</button>';
  h+='<select id="mealType" class="minput" style="flex:0 0 118px;text-align:left"><option value="">Meal\u2026</option><option>breakfast</option><option>lunch</option><option>dinner</option><option>snack</option></select></div>';
  h+='<div class="muted" id="estMsg" style="margin-top:7px"></div>';
  h+='<div id="estPanel" class="hidden"><div class="muted" id="estMeta" style="margin-top:8px;line-height:1.5"></div>';
  h+='<div class="macg"><div class="mc"><label>Cal</label><input id="nc" class="minput" inputmode="numeric"></div><div class="mc"><label>Protein</label><input id="np" class="minput" inputmode="decimal"></div><div class="mc"><label>Carbs</label><input id="ncb" class="minput" inputmode="decimal"></div><div class="mc"><label>Fat</label><input id="nf" class="minput" inputmode="decimal"></div><div class="mc"><label>Fiber</label><input id="nfi" class="minput" inputmode="decimal"></div></div>';
  h+='<button class="btn-primary btn-sm" onclick="nutSave()" style="width:100%">Save meal</button></div>';
  h+='<button class="btn-ghost btn-sm" id="manualBtn" onclick="manualEntry()" style="margin-top:2px">or enter values manually</button>';
  h+='</div>';
  h+='<div class="st">Quick add water</div><div style="display:flex;gap:8px"><button class="btn-sm" style="flex:1;background:var(--card2);border:1px solid var(--line);color:var(--txt)" onclick="nutWater(250)">+250 ml</button><button class="btn-sm" style="flex:1;background:var(--card2);border:1px solid var(--line);color:var(--txt)" onclick="nutWater(500)">+500 ml</button></div>';
  if(d.meals&&d.meals.length){h+='<div class="st">Logged today</div>';d.meals.forEach(m=>{
    const isW=(m.water_ml!=null&&m.water_ml>0&&!m.calories);
    const parts=[];if(m.calories!=null)parts.push(m.calories+' kcal');if(m.protein_g!=null)parts.push('P'+m.protein_g);if(m.carbs_g!=null)parts.push('C'+m.carbs_g);if(m.fat_g!=null)parts.push('F'+m.fat_g);
    const sub=isW?(m.water_ml+' ml water'):parts.join(' \u00B7 ');
    const conf=m.confidence?'<span class="confz '+m.confidence+'">'+m.confidence+'</span>':'';
    const ttl=isW?'Water':(m.description||m.meal_type||'Entry');
    h+='<div class="mealrow"><div class="mt"><div class="md">'+conf+ttl+'</div><div class="ms2">'+((m.meal_type&&!isW)?m.meal_type+' \u00B7 ':'')+sub+'</div></div><button class="gbtn" onclick="nutDel(\''+m.id+'\')">\u00D7</button></div>';
  });}else{h+='<div class="muted" style="text-align:center;margin:16px 0">No meals logged yet today.</div>';}
  $("body").innerHTML=h;
}
async function nutEstimate(){
  const desc=$("mealDesc").value.trim();$("estMsg").textContent='';
  if(!desc){$("estMsg").textContent='Type what you ate first.';return;}
  const b=$("estBtn");b.textContent='Estimating\u2026';b.disabled=true;
  let r=null;try{r=await actPost('nutrition_estimate',{description:desc});}catch(e){}
  b.textContent='\u2728 Estimate with AI';b.disabled=false;
  if(!r||!r.ok){$("estMsg").textContent=(r&&r.error)?('Could not estimate \u2014 '+r.error):'Could not estimate. Try manual entry.';return;}
  const e=r.estimate;usedAI=true;lastConf=e.confidence||null;lastAssump=e.assumptions||null;
  $("nc").value=e.calories!=null?e.calories:'';$("np").value=e.protein_g!=null?e.protein_g:'';$("ncb").value=e.carbs_g!=null?e.carbs_g:'';$("nf").value=e.fat_g!=null?e.fat_g:'';$("nfi").value=e.fiber_g!=null?e.fiber_g:'';
  let meta='';if(e.confidence)meta+='<span class="confz '+e.confidence+'">'+e.confidence+' confidence</span> ';if(e.assumptions)meta+=e.assumptions;
  if(e.items&&e.items.length)meta+='<div style="margin-top:5px">'+e.items.map(it=>it.name+(it.calories!=null?' ('+it.calories+')':'')).join(' \u00B7 ')+'</div>';
  $("estMeta").innerHTML=meta;$("estPanel").classList.remove("hidden");
}
function manualEntry(){usedAI=false;lastConf=null;lastAssump=null;$("estMeta").innerHTML='Enter values manually, then Save.';$("estPanel").classList.remove("hidden");$("manualBtn").classList.add("hidden");}
async function nutSave(){
  const body={meal_type:$("mealType").value||null,description:$("mealDesc").value.trim()||null,calories:$("nc").value||null,protein_g:$("np").value||null,carbs_g:$("ncb").value||null,fat_g:$("nf").value||null,fiber_g:$("nfi").value||null,source:usedAI?'ai_estimate':'manual',confidence:lastConf,ai_note:lastAssump};
  const r=await actPost('nutrition_log',body);
  if(r&&r.ok){showToast('Logged \u2713');usedAI=false;lastConf=null;lastAssump=null;go('nutrition');}else{$("estMsg").textContent='Could not save.';}
}
async function nutWater(ml){const r=await actPost('nutrition_log',{meal_type:'water',water_ml:ml,source:'manual'});if(r&&r.ok){showToast('+'+ml+' ml \u2713');go('nutrition');}}
async function nutDel(id){const r=await actPost('nutrition_delete',{id});if(r&&r.ok){go('nutrition');}}

/* ---------- GOALS & BODY ---------- */
async function renderGoals(){
  const d=await api('goals');cache.goals=d;
  const bc=d.body_comp;let h='';
  h+='<div class="st">Body composition</div>';
  h+='<div class="hero" style="padding:18px"><div class="lbl">Body fat (DEXA)</div>';
  h+='<div class="ring" style="font-size:48px;color:'+(bc.dexa_bf>22?'var(--amb)':'var(--grn)')+'">'+(bc.dexa_bf??'\u2013')+'%</div>';
  h+='<div class="muted">as of '+(bc.dexa_as_of||'\u2013')+' \u00B7 goal '+bc.goal_bf+'% by '+bc.goal_by+'</div>';
  if(bc.dexa_bf!=null){const gap=Math.round((bc.dexa_bf-bc.goal_bf)*10)/10;h+='<div class="verdict">'+(gap>0?(gap+' points to go. Anchor fat-loss to DEXA, not the scale.'):'At/under goal \u2014 hold it.')+'</div>';}
  h+='</div>';
  h+='<div class="row"><div class="col stat"><div class="v">'+(bc.latest_weight??'\u2013')+'</div><div class="k">Weight kg</div></div>';
  h+='<div class="col stat"><div class="v">'+(bc.bia_bf??'\u2013')+'%</div><div class="k">BIA body-fat</div></div></div>';
  if(bc.weight_history&&bc.weight_history.length>1)h+=card('Weight trend','kg',iChart(bc.weight_history.map(w=>({v:w.kg,date:w.date})),{color:'#34d399',unit:' kg'})+dateAxis(bc.weight_history.map(w=>({date:w.date})),fmtMDName));
  if(bc.bia_history&&bc.bia_history.length>1)h+=card('Body-fat trend (BIA scale)','% \u00B7 Withings',iChart(bc.bia_history.map(x=>({v:x.bf,date:x.date})),{color:'#f59e0b',timeScale:true,unit:'%'})+dateAxis(bc.bia_history,fmtMDName),null,'<div class="legend">Scale estimate (daily-ish). DEXA above is the source of truth.</div>');
  let gl=null;try{gl=await actGet('goals_list');}catch(e){}
  GOALS=(gl&&gl.goals)||[];
  h+='<div class="st">Goals on the horizon</div>';
  const colors=['#6366f1','#06b6d4','#34d399','#f59e0b','#f97316','#ef4444'];
  GOALS.forEach((m,i)=>{
    const wk=m.days_away==null?'':(m.days_away<=0?'now':(m.days_away<60?m.days_away+'d':Math.round(m.days_away/30)+'mo'));
    h+='<div class="ms"><div class="dot" style="background:'+colors[i%colors.length]+'"></div><div class="ml">'+m.label+'</div><div class="mw">'+(m.when_text||'')+'</div><div class="pill">'+wk+'</div><button class="gbtn" onclick="goalEdit(\''+m.id+'\')">\u270E</button><button class="gbtn" onclick="goalDel(\''+m.id+'\')">\u00D7</button></div>';
  });
  h+='<button class="btn-ghost btn-sm" onclick="goalAdd()" style="margin-top:4px">+ Add goal</button>';
  $("body").innerHTML=h;
}
function parseWhen(s){if(!s)return null;const m=String(s).match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*[\s\-]*((20)?\d{2})/i);if(!m)return null;const mi=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'].indexOf(m[1].slice(0,3).toLowerCase());if(mi<0)return null;let y=parseInt(m[2]);if(y<100)y+=2000;const mm=String(mi+1).padStart(2,'0');return y+'-'+mm+'-15';}
async function goalSave(b){const r=await actPost('goal_save',b);if(r&&r.goals){showToast('Saved \u2713');go('goals');}else{showToast('Could not save');}}
async function goalDel(id){if(!confirm('Remove this goal?'))return;const r=await actPost('goal_delete',{id:id});if(r&&r.goals){go('goals');}}
function goalEdit(id){const g=GOALS.find(x=>x.id===id);const label=prompt('Goal',g?g.label:'');if(label==null||!label.trim())return;const when=prompt('When? (e.g. Nov 2026)',g?(g.when_text||''):'')||'';goalSave({id:id,label:label.trim(),when_text:when,target_date:parseWhen(when)});}
function goalAdd(){const label=prompt('New goal');if(label==null||!label.trim())return;const when=prompt('When? (e.g. Nov 2026)')||'';goalSave({label:label.trim(),when_text:when,target_date:parseWhen(when)});}

/* ---------- MEDICAL ---------- */
async function renderMedical(){
  const d=await api('medical');cache.medical=d;let h='';
  h+='<div class="card" style="background:var(--card2)"><div style="font-weight:700;margin-bottom:4px">Where to focus now</div>';
  h+='<div class="muted">Latest labs ('+(d.last_report||'\u2013')+'). Observations, not medical advice \u2014 discuss clinical decisions with your doctor.</div>';
  if(d.focus&&d.focus.length)h+='<div style="margin-top:8px">'+d.focus.map(f=>'<span class="tag hi" style="margin-right:6px">'+f+'</span>').join('')+'</div>';
  h+='</div>';
  if(d.notes&&d.notes.length){h+='<div class="card">';d.notes.forEach(n=>{h+='<div style="font-size:13px;line-height:1.55;margin:5px 0;padding-left:15px;text-indent:-11px">• '+n+'</div>';});h+='</div>';}
  h+='<div class="st">Key markers \u00B7 tap chart to read values</div>';
  (d.key_markers||[]).forEach(m=>{
    const flagged=m.status&&/high|low/i.test(m.status);
    const tag=/high/i.test(m.status||'')?'<span class="tag hi">High</span>':/low/i.test(m.status||'')?'<span class="tag lo">Low</span>':'<span class="tag ok">In range</span>';
    const border=flagged?(/high/i.test(m.status)?'var(--red)':'var(--amb)'):'var(--grn)';
    let arrow='';if(m.prev_value!=null){const good=(m.direction==='up'&&m.higher_is_better)||(m.direction==='down'&&!m.higher_is_better);const bad=(m.direction==='up'&&!m.higher_is_better)||(m.direction==='down'&&m.higher_is_better);const col=good?'#86efac':bad?'#fca5a5':'var(--mut)';const ar=m.direction==='up'?'\u25B2':m.direction==='down'?'\u25BC':'\u2013';arrow=' <span style="color:'+col+';font-size:12px">'+ar+' from '+m.prev_value+'</span>';}
    h+='<div class="mk" style="border-left-color:'+border+'"><div class="top"><div><span class="nm">'+m.metric+'</span> '+tag+'</div><div class="vl">'+m.value+' <span class="muted" style="font-size:12px">'+(m.unit||'')+'</span></div></div>';
    h+='<div class="rg">'+(m.ref_low!=null?'ref '+m.ref_low+'\u2013'+(m.ref_high||''):(m.ref_high!=null?'ref <'+m.ref_high:''))+arrow+'</div>';
    if(m.history&&m.history.length>1)h+='<div style="margin-top:8px">'+iChart(m.history.map(x=>({v:x.v,date:x.date})),{color:flagged?'#fca5a5':'#86efac',h:54,timeScale:true,unit:(m.unit?' '+m.unit:'')})+dateAxis(m.history,fmtMY)+'</div>';
    if(m.why)h+='<div class="wy">'+m.why+'</div>';
    h+='</div>';
  });
  (d.sections||[]).forEach(sec=>{
    h+='<div class="st">'+sec.group+(sec.flagged?' \u00B7 <span style="color:#fca5a5">'+sec.flagged+' flagged</span>':'')+'</div>';
    h+='<div class="card" style="padding:4px 14px"><table class="mtable">';
    h+='<tr><td class="muted">Marker</td><td class="muted" style="text-align:right">Latest</td><td class="muted" style="text-align:right">vs prev</td></tr>';
    sec.markers.forEach(m=>{
      const tag=/high/i.test(m.status||'')?' <span class="tag hi">Hi</span>':/low/i.test(m.status||'')?' <span class="tag lo">Lo</span>':'';
      let cell='\u2013';if(m.prev_value!=null){const good=(m.direction==='up'&&m.higher_is_better)||(m.direction==='down'&&!m.higher_is_better);const bad=(m.direction==='up'&&!m.higher_is_better)||(m.direction==='down'&&m.higher_is_better);const col=good?'#86efac':bad?'#fca5a5':'var(--mut)';const ar=m.direction==='up'?'\u25B2':m.direction==='down'?'\u25BC':'\u2013';cell='<span style="color:'+col+'">'+ar+' '+m.prev_value+'</span>';}
      h+='<tr><td>'+m.metric+tag+'</td><td style="text-align:right;font-weight:700">'+m.value+' <span class="muted">'+(m.unit||'')+'</span></td><td style="text-align:right;font-size:12px">'+cell+'</td></tr>';
    });
    h+='</table></div>';
  });
  if(d.panel_size)h+='<div class="muted" style="text-align:center;margin:16px 4px 4px">Showing trended & flagged markers \u00B7 full panel has '+d.panel_size+' markers from your last report.</div>';
  $("body").innerHTML=h;
}
